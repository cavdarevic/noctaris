<!DOCTYPE html>
<html lang='en'>
<head>
<meta charset='UTF-8'>
<meta name='viewport' content='width=device-width, initial-scale=1.0'>
<title>NOCTARIS — Atlas</title>
<link rel='stylesheet' href='/style.css'>
</head>
<body>
<main class='atlas-page' id='top'>
<div class='utility-row'>
<a href='#photos' class='utility-link'>View Photos</a>
<a href='#pedigree' class='utility-link'>View Pedigree</a>
</div>

<section id='pedigree'><h2>Pedigree</h2></section>

<section id='photos'>
<div class='photo-grid'>
<button class='photo-item is-visible'><img src='/assets/atlas/atlas-01.webp'></button>
<button class='photo-item is-visible'><img src='/assets/atlas/atlas-02.webp'></button>
<button class='photo-item is-visible'><img src='/assets/atlas/atlas-03.webp'></button>
</div>
</section>

<div class='bottom-actions'>
<a href='#top' class='utility-link'>Back To Top</a>
</div>
</main>

<div class='gallery-modal' id='gallery'>
<button class='gallery-close' id='closeBtn'>Close</button>
<button class='gallery-arrow gallery-prev' id='prevBtn'>‹</button>
<img class='gallery-image' id='galleryImage'>
<button class='gallery-arrow gallery-next' id='nextBtn'>›</button>
</div>

<script>
document.addEventListener('DOMContentLoaded',()=>{
const modal=document.getElementById('gallery');
const img=document.getElementById('galleryImage');
const items=[...document.querySelectorAll('.photo-item')];
const closeBtn=document.getElementById('closeBtn');
const prevBtn=document.getElementById('prevBtn');
const nextBtn=document.getElementById('nextBtn');
let current=0;
let scale=1;
let startX=0;
let lastTap=0;

function openGallery(index){
current=index;
scale=1;
img.style.transform='scale(1)';
img.src=items[current].querySelector('img').src;
modal.classList.add('is-open');
document.body.style.overflow='hidden';
}

function closeGallery(){
modal.classList.remove('is-open');
document.body.style.overflow='';
document.getElementById('photos').scrollIntoView({behavior:'smooth'});
}

function show(delta){
current=(current+delta+items.length)%items.length;
scale=1;
img.style.transform='scale(1)';
img.src=items[current].querySelector('img').src;
}

items.forEach((item,index)=>{
item.addEventListener('click',()=>openGallery(index));
});

closeBtn.addEventListener('click',closeGallery);
prevBtn.addEventListener('click',()=>show(-1));
nextBtn.addEventListener('click',()=>show(1));

modal.addEventListener('touchstart',e=>{
startX=e.touches[0].clientX;
});

modal.addEventListener('touchend',e=>{
const diff=e.changedTouches[0].clientX-startX;
const now=Date.now();
if(now-lastTap<280){
scale=scale===1?1.5:1;
img.style.transform=`scale(${scale})`;
}
lastTap=now;
if(scale===1&&Math.abs(diff)>45){
show(diff<0?1:-1);
}
});

img.addEventListener('wheel',e=>{
e.preventDefault();
scale+=e.deltaY*-0.001;
scale=Math.min(Math.max(1,scale),4);
img.style.transform=`scale(${scale})`;
});
});
</script>
</body>
</html>
